name: Docs Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.vale.ini'
      - '.github/workflows/docs-lint.yml'
      - '.vale/**'
  pull_request:
    paths:
      - '**/*.md'
      - '.vale.ini'
      - '.github/workflows/docs-lint.yml'
      - '.vale/**'

jobs:
  vale:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vale
        run: |
          brew install vale
      - name: Sync Vale styles
        run: |
          vale sync
      - name: Resolve markdown files in scope
        id: md
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" \
              | grep -E '\.md$' > /tmp/vale-files.txt || true
          else
            git ls-files '*.md' > /tmp/vale-files.txt
          fi
          if [ ! -s /tmp/vale-files.txt ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_files=true" >> "$GITHUB_OUTPUT"
      - name: Run Vale
        if: steps.md.outputs.has_files == 'true'
        run: |
          xargs vale < /tmp/vale-files.txt
