name: CI Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift tests
        run: |
          if [ -f Package.swift ]; then
            swift test
          else
            echo "No Package.swift found at repo root; skipping SwiftPM tests."
          fi
